version: "3.8"

services:
  backend:
    build: ./api_base
    ports:
      - "5000:5000"
    env_file:
      - ./api_base/.env
    environment:
      - FLASK_ENV=development
      - BACKEND_PORT=5000
      - DATABASE_URL=mysql+pymysql://root:rootpassword@db:3306/ai_translation
      - FRONTEND_URL=http://localhost
    volumes:
      - ./api_base/utils/upload_temp:/app/utils/upload_temp
      - ./api_base/utils/download:/app/utils/download
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ai_translation
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./api_base/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
