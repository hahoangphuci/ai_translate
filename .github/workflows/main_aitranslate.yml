# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - aitranslate

on:
  push:
    branches:
      - main
    paths:
      - 'api_base/**'
      - 'frontend/**'
      - 'requirements.txt'
      - '.github/workflows/main_aitranslate.yml'
  workflow_dispatch:

# Do NOT cancel in-progress deploys: cancelled OneDeploy runs leave Kudu locks (HTTP 409).
concurrency:
  group: aitranslate-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_771C990487C54F5FA2FE527C91F30417 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B0113AD5896E4EF8B2B940E57D4F8B52 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_54E7EB8FDF8F4DDA935EAFF754E02423 }}

      - name: Create deployment zip
        run: |
          zip -r deploy.zip requirements.txt api_base frontend \
            -x "api_base/instance/*" \
            -x "*__pycache__/*" \
            -x "*/.venv/*" \
            -x "frontend/node_modules/*"

      - name: Configure Azure app and clear Kudu state
        run: |
          RG=$(az webapp list --query "[?name=='aitranslate'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "Could not resolve resource group for aitranslate"
            exit 1
          fi
          echo "RESOURCE_GROUP=$RG" >> "$GITHUB_ENV"

          PUBLISH_URL=$(az webapp deployment list-publishing-profiles \
            --resource-group "$RG" \
            --name aitranslate \
            --query "[?publishMethod=='ZipDeploy'].publishUrl | [0]" -o tsv)
          SCM="https://${PUBLISH_URL%%:*}"
          echo "SCM_URL=$SCM" >> "$GITHUB_ENV"
          echo "Resource group: $RG"
          echo "SCM URL: $SCM"

          az webapp config appsettings delete \
            --resource-group "$RG" \
            --name aitranslate \
            --setting-names WEBSITE_RUN_FROM_PACKAGE \
            --output none 2>/dev/null || true

          az webapp config appsettings set \
            --resource-group "$RG" \
            --name aitranslate \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true BACKEND_PORT=8000 WEBSITES_PORT=8000 \
            --output none

          az webapp config set \
            --resource-group "$RG" \
            --name aitranslate \
            --startup-file "python api_base/run_api.py" \
            --output none

          USER=$(az webapp deployment list-publishing-credentials \
            --resource-group "$RG" \
            --name aitranslate \
            --query publishingUserName -o tsv)
          PASS=$(az webapp deployment list-publishing-credentials \
            --resource-group "$RG" \
            --name aitranslate \
            --query publishingPassword -o tsv)
          echo "::add-mask::$PASS"

          curl -sf -u "$USER:$PASS" -H "Content-Type: application/json" \
            -d '{"command":"rm -rf /home/site/locks/* /home/site/deployments/*; echo kudu-cleaned","dir":"/home"}' \
            "$SCM/api/command" || echo "Kudu cleanup skipped (non-fatal)"

          echo "Waiting 120s for Kudu to settle..."
          sleep 120

      - name: Deploy via Kudu ZipDeploy (bypass OneDeploy)
        run: |
          USER=$(az webapp deployment list-publishing-credentials \
            --resource-group "$RESOURCE_GROUP" \
            --name aitranslate \
            --query publishingUserName -o tsv)
          PASS=$(az webapp deployment list-publishing-credentials \
            --resource-group "$RESOURCE_GROUP" \
            --name aitranslate \
            --query publishingPassword -o tsv)

          echo "Starting async ZipDeploy..."
          HTTP_CODE=$(curl -sS -w "%{http_code}" -o zipdeploy-response.json \
            -X POST \
            -u "$USER:$PASS" \
            --data-binary @"deploy.zip" \
            -H "Content-Type: application/zip" \
            "$SCM_URL/api/zipdeploy?isAsync=true&deployer=GITHUB_ACTIONS")

          echo "ZipDeploy accepted with HTTP $HTTP_CODE"
          cat zipdeploy-response.json || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ZipDeploy request failed"
            exit 1
          fi

          echo "Polling deployment status (Oryx build may take 10-20 min)..."
          for i in $(seq 1 40); do
            DEPLOY=$(curl -sf -u "$USER:$PASS" "$SCM_URL/api/deployments/latest" || echo '{}')
            STATUS=$(echo "$DEPLOY" | jq -r '.status // empty')
            MSG=$(echo "$DEPLOY" | jq -r '.message // empty')
            echo "Poll $i/40: status=$STATUS message=$MSG"
            if [ "$STATUS" = "4" ]; then
              echo "Deploy succeeded"
              exit 0
            fi
            if [ "$STATUS" = "3" ]; then
              echo "Deploy failed"
              curl -sf -u "$USER:$PASS" "$SCM_URL/api/deployments/latest/log" || true
              exit 1
            fi
            sleep 30
          done
          echo "Deploy timed out waiting for Oryx build"
          exit 1
