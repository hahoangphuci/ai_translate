# Azure App Service deploy for aitranslate
#
# ONE-TIME setup in Azure Portal (Configuration):
#   SCM_DO_BUILD_DURING_DEPLOYMENT = true
#   BACKEND_PORT = 8000
#   WEBSITES_PORT = 8000
#   Startup Command = python api_base/run_api.py
#
# REQUIRED: Deployment Center -> Disconnect GitHub (avoid parallel deploy -> HTTP 409)

name: Build and deploy Python app to Azure Web App - aitranslate

env:
  AZURE_WEBAPP_NAME: aitranslate2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'api_base/**'
      - 'frontend/**'
      - 'requirements.txt'

concurrency:
  group: aitranslate-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate dependencies install
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_771C990487C54F5FA2FE527C91F30417 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B0113AD5896E4EF8B2B940E57D4F8B52 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_54E7EB8FDF8F4DDA935EAFF754E02423 }}

      - name: Create deployment zip
        run: |
          zip -r deploy.zip requirements.txt api_base frontend \
            -x "api_base/instance/*" \
            -x "*__pycache__/*" \
            -x "*/.venv/*" \
            -x "frontend/node_modules/*"
          ls -lh deploy.zip

      - name: Prepare Kudu and wait until idle
        run: |
          set -euo pipefail

          RG=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "Could not resolve resource group for ${{ env.AZURE_WEBAPP_NAME }}"
            exit 1
          fi

          PUBLISH_URL=$(az webapp deployment list-publishing-profiles \
            --resource-group "$RG" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --query "[?publishMethod=='ZipDeploy'].publishUrl | [0]" -o tsv)
          SCM="https://${PUBLISH_URL%%:*}"

          USER=$(az webapp deployment list-publishing-credentials \
            --resource-group "$RG" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --query publishingUserName -o tsv)
          PASS=$(az webapp deployment list-publishing-credentials \
            --resource-group "$RG" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --query publishingPassword -o tsv)
          echo "::add-mask::$PASS"

          echo "RESOURCE_GROUP=$RG" >> "$GITHUB_ENV"
          echo "SCM_URL=$SCM" >> "$GITHUB_ENV"
          echo "PUBLISH_USER=$USER" >> "$GITHUB_ENV"
          echo "PUBLISH_PASS=$PASS" >> "$GITHUB_ENV"

          echo "Restarting app to clear in-memory Kudu deployment lock..."
          az webapp restart --resource-group "$RG" --name "${{ env.AZURE_WEBAPP_NAME }}"
          sleep 90

          echo "=== Kudu deployments (before upload) ==="
          curl -sf -u "$USER:$PASS" "$SCM/api/deployments" | jq '.[0:5]' || echo "[]"

          echo "=== Waiting for Kudu to become idle ==="
          for i in $(seq 1 60); do
            LATEST=$(curl -sf -u "$USER:$PASS" "$SCM/api/deployments/latest" 2>/dev/null || echo '{}')
            STATUS=$(echo "$LATEST" | jq -r '.status // "none"')
            MSG=$(echo "$LATEST" | jq -r '.message // ""')
            echo "Idle check $i/60: status=$STATUS message=$MSG"

            # 0=pending, 1=building, 2=deploying -> still busy
            if [ "$STATUS" = "0" ] || [ "$STATUS" = "1" ] || [ "$STATUS" = "2" ]; then
              sleep 30
              continue
            fi
            break
          done

          FINAL_STATUS=$(curl -sf -u "$USER:$PASS" "$SCM/api/deployments/latest" 2>/dev/null | jq -r '.status // "none"')
          if [ "$FINAL_STATUS" = "0" ] || [ "$FINAL_STATUS" = "1" ] || [ "$FINAL_STATUS" = "2" ]; then
            echo ""
            echo "ERROR: Kudu still reports an active deployment (status=$FINAL_STATUS)."
            echo "Another source is deploying to this app (usually Azure Deployment Center)."
            echo "Fix: Azure Portal -> App Service -> Deployment Center -> Disconnect GitHub."
            echo "Then: Overview -> Restart, wait 5 minutes, re-run this workflow once."
            exit 1
          fi

          echo "Kudu is idle. Proceeding to ZipDeploy."

      - name: Deploy via Kudu ZipDeploy
        run: |
          set -euo pipefail

          HTTP_CODE=$(curl -sS -w "%{http_code}" -o zipdeploy-response.json \
            -X POST \
            -u "$PUBLISH_USER:$PUBLISH_PASS" \
            --data-binary @"deploy.zip" \
            -H "Content-Type: application/zip" \
            "$SCM_URL/api/zipdeploy?isAsync=true&deployer=GITHUB_ACTIONS")

          echo "ZipDeploy HTTP $HTTP_CODE"
          cat zipdeploy-response.json || true

          if [ "$HTTP_CODE" = "409" ]; then
            echo ""
            echo "ERROR: HTTP 409 - deployment already in progress on Kudu."
            echo "Azure Deployment Center is likely still connected and deploying in parallel."
            echo "Disconnect it in Portal, restart the app, wait 5 minutes, run workflow again."
            exit 1
          fi

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ZipDeploy request failed"
            exit 1
          fi

          echo "Polling deployment status (Oryx build may take 10-20 min)..."
          for i in $(seq 1 40); do
            DEPLOY=$(curl -sf -u "$PUBLISH_USER:$PUBLISH_PASS" "$SCM_URL/api/deployments/latest" || echo '{}')
            STATUS=$(echo "$DEPLOY" | jq -r '.status // empty')
            MSG=$(echo "$DEPLOY" | jq -r '.message // empty')
            echo "Poll $i/40: status=$STATUS message=$MSG"
            if [ "$STATUS" = "4" ]; then
              echo "Deploy succeeded"
              exit 0
            fi
            if [ "$STATUS" = "3" ]; then
              echo "Deploy failed"
              curl -sf -u "$PUBLISH_USER:$PUBLISH_PASS" "$SCM_URL/api/deployments/latest/log" || true
              exit 1
            fi
            sleep 30
          done

          echo "Deploy timed out waiting for Oryx build"
          exit 1
