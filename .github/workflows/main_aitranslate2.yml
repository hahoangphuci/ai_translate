# Azure App Service deploy for aitranslate2
#
# Portal setup (one time):
#   SCM_DO_BUILD_DURING_DEPLOYMENT = true
#   BACKEND_PORT = 8000
#   WEBSITES_PORT = 8000
#   Startup Command = python api_base/run_api.py

name: Build and deploy Python app to Azure Web App - aitranslate2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aitranslate2-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !app_web_view/
            !requirements-full.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D467F7B1449C4EB38A079BE95B941D89 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A2357084D02A4CD68A7C61B9A2155CAD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AC3D578CD1554555B4C3A9E215F9332B }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: aitranslate2
          package: .
