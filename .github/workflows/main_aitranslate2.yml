# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - aitranslate2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify requirements for Azure runtime
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "from pdf2docx import Converter; print('pdf2docx OK')"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !**/.git/**
            !**/__pycache__/**
            !**/*.pyc
            !antenv/**
            !app_web_view/build/**
            !app_web_view/.dart_tool/**
            !tools/**

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_793A9A38972A403AB7A9FFA60DCCF013 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_22EB12FAFB244BA690586062CB0487AF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6433533AE0694AACABE1DF695065F687 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: aitranslate2
          slot-name: Production
          startup-command: bash startup.sh
