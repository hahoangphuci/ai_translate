# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - aitranslate2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies into python_packages (Linux wheels for Azure)
        run: |
          python -m pip install --upgrade pip
          # pdf2docx declares opencv-python (GUI) — install without deps; headless only for Azure
          grep -Ev '^(pdf2docx|#)' api_base/requirements.txt > /tmp/requirements_no_pdf2docx.txt
          pip install --target python_packages -r /tmp/requirements_no_pdf2docx.txt
          pip install --target python_packages pdf2docx==0.5.7 --no-deps
          rm -rf python_packages/cv2 python_packages/opencv_python_headless.libs
          pip install --target python_packages --no-deps "opencv-python-headless==4.12.0.88"
          rm -rf python_packages/opencv_python-[0-9]*.dist-info python_packages/opencv_python.libs 2>/dev/null || true
          if compgen -G "python_packages/opencv_python-[0-9]*.dist-info" > /dev/null; then
            echo "ERROR: opencv-python (GUI) must not be deployed" && exit 1
          fi
          PYTHONPATH=python_packages python -c "import cv2; import fitz; from pdf2docx import Converter; print('pdf2docx OK', cv2.__version__, fitz.VersionBind)"
          test -d python_packages/pdf2docx || (echo "pdf2docx folder missing in artifact" && exit 1)
          test -d python_packages/cv2 || (echo "cv2 missing in artifact" && exit 1)
          PYTHONPATH=python_packages python -c "import gunicorn; print('gunicorn OK', gunicorn.__version__)"

      - name: Verify run_api boots on Linux (Azure-like env)
        run: |
          export WEBSITE_SITE_NAME=aitranslate2
          export WEBSITES_PORT=8000
          export BACKEND_PORT=8000
          cd api_base
          PYTHONPATH=../python_packages python -c "import run_api; print('run_api boot OK')"

      - name: Verify pdf2docx imports on slim Linux (Azure-like, no libxcb)
        run: |
          docker run --rm -v "$PWD/python_packages:/pkg:ro" python:3.11-slim-bookworm bash -lc \
            'PYTHONPATH=/pkg python -c "import cv2; from pdf2docx import Converter; print(\"slim OK\", cv2.__version__)"'

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !**/.git/**
            !**/__pycache__/**
            !**/*.pyc
            !antenv/**
            !.venv/**
            !app_web_view/build/**
            !app_web_view/.dart_tool/**
            !tools/**

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Prepare startup script
        run: chmod +x startup.sh

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_793A9A38972A403AB7A9FFA60DCCF013 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_22EB12FAFB244BA690586062CB0487AF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6433533AE0694AACABE1DF695065F687 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: aitranslate2
          slot-name: Production
          startup-command: 'bash /home/site/wwwroot/startup.sh'

      - name: Deploy failed hint (Site Disabled)
        if: failure() && steps.deploy-to-webapp.outcome == 'failure'
        run: |
          echo "::error::Deploy failed. If log shows 'Site Disabled (CODE: 403)', open Azure Portal -> App Service 'aitranslate2' -> Overview -> Start, then re-run this workflow."
